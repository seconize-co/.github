name: "Bug Report"
description: "Report a bug found during development or testing"
title: "BUG: "
labels: ["bug", "priority/P2"]
body:
  - type: markdown
    attributes:
      value: |
        > **Priority label defaults to `priority/P2`.** After submitting, update the label on the right sidebar if this is higher priority:
        > - `priority/P0` — Production down, fix immediately
        > - `priority/P1` — Major impact, fix same day
        > - `priority/P2` — Normal impact *(default — no change needed)*
        > - `priority/P3` — Low impact, normal backlog

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: "Clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: "Step-by-step instructions to reproduce the behavior"
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - "Database (drc-setup)"
        - "Backend API (drc-server)"
        - "Frontend UI (drc-ui-v3)"
        - "Reports (drc-report)"
        - "Agents (drc-agents)"
        - "Sensor (drc-sensor)"
        - "Documentation & SOPs (drc-sops)"
        - "Infrastructure (drc-infra)"
        - "Connectors (drc-connectors)"
        - "Collector (drc-collector)"
        - "Queue Manager (drc-deq-mgr)"
        - "Document Remediation (drc-drm)"
        - "CIS Benchmarks (drc-cis-benchmarks)"
        - "Testing (drc-test)"
        - "Product Help & Documentation (drc-help)"
        - "SRI Server / CVE Intelligence (sri-server)"
        - "Production Log Intelligence (drc-prod-ops)"
        - "Cloud Security Audit (scoutsuite)"
        - "Cloud Security Scanning (cloudsploit)"
        - "Unknown"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: "How severe is the impact on the system or users?"
      options:
        - "Critical — System down or data loss"
        - "High — Major feature broken, no workaround"
        - "Medium — Feature impaired, workaround exists"
        - "Low — Minor issue, cosmetic"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: "Where was this bug found?"
      options:
        - "Production"
        - "Staging"
        - "Dev"
        - "Local"
    validations:
      required: true

  - type: input
    id: customer_impact
    attributes:
      label: Customer Impact
      description: "If customer-reported, link the Customer_Ops issue. Leave blank if found internally."
      placeholder: "seconize-co/Customer_Ops#123 (optional)"

  - type: input
    id: feature_epic
    attributes:
      label: Related Feature Epic
      description: "If this bug is related to a feature epic, link it here"
      placeholder: "seconize-co/drc-workspace#42 (optional)"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Screenshots, logs, environment details, browser/OS info"
