name: "Bug Report"
description: "Report a bug in this repository"
title: "BUG: "
labels: ["bug", "priority/P2"]
body:
  - type: markdown
    attributes:
      value: |
        **Priority:** This issue has been labelled `priority/P2` (normal cadence) by default.
        Upgrade to `priority/P0` or `priority/P1` on the sidebar if the bug is urgent.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: "Clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: "Step-by-step instructions to reproduce the behavior"
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: "How severe is the impact on the system or users?"
      options:
        - "Critical — System down or data loss"
        - "High — Major feature broken, no workaround"
        - "Medium — Feature impaired, workaround exists"
        - "Low — Minor issue, cosmetic"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: "Where was this bug found?"
      options:
        - "Production"
        - "Staging"
        - "Dev"
        - "Local"
    validations:
      required: true

  - type: input
    id: customer_impact
    attributes:
      label: Customer Impact
      description: "If customer-reported, link the drc-workspace intake issue. Leave blank if found internally."
      placeholder: "seconize-co/drc-workspace#N (optional)"

  - type: input
    id: feature_epic
    attributes:
      label: Related Feature Epic
      description: "If this bug is related to a feature epic, link it here"
      placeholder: "seconize-co/drc-workspace#42 (optional)"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Screenshots, logs, environment details, browser/OS info"
